<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تيتريس / Tetris - YallaPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg-deep:#070711;--bg-card:#0e0e1f;--bg-elevated:#13132a;--border:#1e1e3f;--accent:#7c3aed;--accent-bright:#a855f7;--accent-glow:rgba(124,58,237,0.4);--gold:#f59e0b;--green:#10b981;--red:#ef4444;--text-primary:#f1f0ff;--text-secondary:#9ca3c8;--text-muted:#4b5280;--font-ar:'Cairo',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-ar);min-height:100vh;display:flex;flex-direction:column;}
  header{background:rgba(7,7,17,0.9);border-bottom:1px solid var(--border);padding:0 1.5rem;backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;}
  .header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem;}
  .back-btn{color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .lang-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.3rem 0.6rem;border-radius:6px;font-family:var(--font-ar);font-weight:700;font-size:0.8rem;cursor:pointer;}
  main{flex:1;display:flex;justify-content:center;padding:1rem;gap:1rem;flex-wrap:wrap;}
  .game-area{display:flex;flex-direction:column;align-items:center;gap:0.75rem;}
  canvas{border:2px solid var(--border);border-radius:8px;background:#0a0a1a;box-shadow:0 0 25px var(--accent-glow);display:block;}
  .side-panel{display:flex;flex-direction:column;gap:0.75rem;min-width:110px;}
  .panel-box{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:0.75rem;text-align:center;}
  .panel-lbl{font-size:0.68rem;color:var(--text-muted);margin-bottom:0.3rem;}
  .panel-val{font-size:1.3rem;font-weight:900;color:var(--accent-bright);}
  #next-canvas{border-radius:6px;background:#0a0a1a;border:1px solid var(--border);}
  .ctrl-grid{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px;gap:4px;}
  .ctrl-grid .up{grid-column:2;grid-row:1;}
  .ctrl-grid .lt{grid-column:1;grid-row:2;}
  .ctrl-grid .dn{grid-column:2;grid-row:2;}
  .ctrl-grid .rt{grid-column:3;grid-row:2;}
  .ctrl-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);width:56px;height:56px;border-radius:10px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;user-select:none;}
  .ctrl-btn:active{background:var(--accent);border-color:var(--accent);}
  .action-row{display:flex;gap:0.5rem;}
  .btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.5rem 1rem;border-radius:8px;font-family:var(--font-ar);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-bright));color:white;border:none;}
  .btn-primary:hover{color:white;transform:translateY(-1px);}
  #overlay{display:none;position:fixed;inset:0;background:rgba(7,7,17,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:1rem;}
  #overlay.show{display:flex;}
  #overlay h2{font-size:1.8rem;font-weight:900;}

  .share-game-btn { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .share-game-btn:hover { border-color: var(--accent); color: var(--accent-bright); }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="../index.html" class="back-btn" id="back-lbl">← الرئيسية</a>
    <span style="font-size:1.1rem;font-weight:900;">🟦 <span id="title-lbl">تيتريس</span></span>
    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
  </div>
</header>

<main>
  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-lbl" id="score-lbl">النقاط</div>
      <div class="panel-val" id="score">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-lbl" id="level-lbl">المستوى</div>
      <div class="panel-val" id="level">1</div>
    </div>
    <div class="panel-box">
      <div class="panel-lbl" id="lines-lbl">الصفوف</div>
      <div class="panel-val" id="lines">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-lbl" id="best-lbl">الأفضل</div>
      <div class="panel-val" id="best">0</div>
    </div>
  </div>

  <div class="game-area">
    <div style="position:relative;">
      <canvas id="canvas"></canvas>
      <div id="overlay">
        <div style="font-size:3rem">🟦</div>
        <h2 id="ov-title">تيتريس</h2>
        <p style="color:var(--text-secondary)" id="ov-msg">اضغط للبدء</p>
        <button class="btn btn-primary" onclick="startGame();document.getElementById('overlay').classList.remove('show');" id="start-btn">▶ ابدأ</button>
      </div>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="startGame()" id="new-btn">🔄</button>
      <button class="btn" onclick="togglePause()" id="pause-btn">⏸</button>
    </div>
    <div class="ctrl-grid">
      <button class="ctrl-btn up" onclick="rotatePiece()">↺</button>
      <button class="ctrl-btn lt" onclick="moveLeft()">◄</button>
      <button class="ctrl-btn dn" onclick="softDrop()">▼</button>
      <button class="ctrl-btn rt" onclick="moveRight()">►</button>
    </div>
    <button class="ctrl-btn" style="width:100%;border-radius:10px;" onclick="hardDrop()" id="drop-btn">⬇ إنزال</button>
  </div>

  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-lbl" id="next-lbl">التالي</div>
      <canvas id="next-canvas" width="80" height="80"></canvas>
    </div>
  </div>
</main>

<div class="ad-zone" style="padding:1rem 2rem;text-align:center;border-top:1px solid #1e1e3f;background:rgba(14,14,31,0.5);">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="3333333333"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<script>
const COLS=10, ROWS=20, SZ=24;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
canvas.width=COLS*SZ; canvas.height=ROWS*SZ;
const nc=document.getElementById('next-canvas');
const nctx=nc.getContext('2d');

const PIECES=[
  {shape:[[1,1,1,1]],color:'#06b6d4'},          // I
  {shape:[[1,1],[1,1]],color:'#facc15'},           // O
  {shape:[[0,1,0],[1,1,1]],color:'#a855f7'},       // T
  {shape:[[0,1,1],[1,1,0]],color:'#22c55e'},       // S
  {shape:[[1,1,0],[0,1,1]],color:'#ef4444'},       // Z
  {shape:[[1,0,0],[1,1,1]],color:'#3b82f6'},       // J
  {shape:[[0,0,1],[1,1,1]],color:'#f97316'},       // L
];

let board,cur,next,score,linesCleared,level,best,running,paused,dropTimer;
best=parseInt(localStorage.getItem('tetris_best')||'0');
document.getElementById('best').textContent=best;

function startGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;linesCleared=0;level=1;running=true;paused=false;
  document.getElementById('score').textContent=0;
  document.getElementById('lines').textContent=0;
  document.getElementById('level').textContent=1;
  document.getElementById('pause-btn').textContent='⏸';
  next=randomPiece();
  spawnPiece();
  clearInterval(dropTimer);
  dropTimer=setInterval(gravity,getInterval());
  draw();
}

function randomPiece(){
  const p=PIECES[Math.floor(Math.random()*PIECES.length)];
  return{shape:p.shape.map(r=>[...r]),color:p.color};
}

function spawnPiece(){
  cur={...next,x:Math.floor(COLS/2)-Math.floor(next.shape[0].length/2),y:0};
  next=randomPiece();
  drawNext();
  if(collide(cur.shape,cur.x,cur.y)){endGame();}
}

function getInterval(){return Math.max(100,600-level*55);}

function gravity(){
  if(!running||paused)return;
  if(!collide(cur.shape,cur.x,cur.y+1)){cur.y++;}
  else{place();}
  draw();
}

function collide(shape,ox,oy){
  for(let r=0;r<shape.length;r++)
    for(let c=0;c<shape[r].length;c++)
      if(shape[r][c]){
        const nx=ox+c,ny=oy+r;
        if(nx<0||nx>=COLS||ny>=ROWS)return true;
        if(ny>=0&&board[ny][nx])return true;
      }
  return false;
}

function place(){
  cur.shape.forEach((r,ri)=>r.forEach((v,ci)=>{
    if(v&&cur.y+ri>=0)board[cur.y+ri][cur.x+ci]=cur.color;
  }));
  clearLines();
  spawnPiece();
}

function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(v=>v)){
      board.splice(r,1);
      board.unshift(Array(COLS).fill(null));
      cleared++;r++;
    }
  }
  if(cleared){
    const pts=[0,100,300,500,800][cleared]*level;
    score+=pts;linesCleared+=cleared;
    level=Math.floor(linesCleared/10)+1;
    document.getElementById('score').textContent=score;
    document.getElementById('lines').textContent=linesCleared;
    document.getElementById('level').textContent=level;
    if(score>best){best=score;localStorage.setItem('tetris_best',best);document.getElementById('best').textContent=best;}
    clearInterval(dropTimer);dropTimer=setInterval(gravity,getInterval());
  }
}

function rotatePiece(){
  const rot=cur.shape[0].map((_,i)=>cur.shape.map(r=>r[i]).reverse());
  if(!collide(rot,cur.x,cur.y)){cur.shape=rot;draw();}
  else if(!collide(rot,cur.x+1,cur.y)){cur.x++;cur.shape=rot;draw();}
  else if(!collide(rot,cur.x-1,cur.y)){cur.x--;cur.shape=rot;draw();}
}
function moveLeft(){if(!collide(cur.shape,cur.x-1,cur.y)){cur.x--;draw();}}
function moveRight(){if(!collide(cur.shape,cur.x+1,cur.y)){cur.x++;draw();}}
function softDrop(){if(!collide(cur.shape,cur.x,cur.y+1)){cur.y++;score++;document.getElementById('score').textContent=score;draw();}}
function hardDrop(){while(!collide(cur.shape,cur.x,cur.y+1)){cur.y++;score+=2;}document.getElementById('score').textContent=score;place();draw();}
function togglePause(){
  if(!running)return;
  paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
  if(!paused){clearInterval(dropTimer);dropTimer=setInterval(gravity,getInterval());}
}

function getGhostY(){
  let gy=cur.y;
  while(!collide(cur.shape,cur.x,gy+1))gy++;
  return gy;
}

function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid lines
  ctx.strokeStyle='rgba(30,30,63,0.4)';ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*SZ,0);ctx.lineTo(c*SZ,canvas.height);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*SZ);ctx.lineTo(canvas.width,r*SZ);ctx.stroke();}
  // Board
  board.forEach((row,r)=>row.forEach((v,c)=>{if(v)drawCell(ctx,c,r,v);}));
  // Ghost
  if(cur){
    const gy=getGhostY();
    cur.shape.forEach((row,r)=>row.forEach((v,c)=>{
      if(v){
        ctx.fillStyle='rgba(255,255,255,0.12)';
        ctx.fillRect((cur.x+c)*SZ+1,(gy+r)*SZ+1,SZ-2,SZ-2);
      }
    }));
    // Current piece
    cur.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v)drawCell(ctx,cur.x+c,cur.y+r,cur.color);}));
  }
}

function drawCell(c,x,y,color){
  c.fillStyle=color;
  c.fillRect(x*SZ+1,y*SZ+1,SZ-2,SZ-2);
  c.fillStyle='rgba(255,255,255,0.25)';
  c.fillRect(x*SZ+1,y*SZ+1,SZ-2,4);
  c.fillRect(x*SZ+1,y*SZ+1,4,SZ-2);
  c.fillStyle='rgba(0,0,0,0.2)';
  c.fillRect(x*SZ+SZ-5,y*SZ+1,4,SZ-2);
}

function drawNext(){
  nctx.fillStyle='#0a0a1a';nctx.fillRect(0,0,80,80);
  if(!next)return;
  const s=16;
  const ox=Math.floor((5-next.shape[0].length)/2);
  const oy=Math.floor((5-next.shape.length)/2);
  next.shape.forEach((row,r)=>row.forEach((v,c)=>{
    if(v){nctx.fillStyle=next.color;nctx.fillRect((ox+c)*s+4,(oy+r)*s+4,s-2,s-2);}
  }));
}

function endGame(){
  running=false;clearInterval(dropTimer);
  document.getElementById('ov-title').textContent=currentLang==='ar'?'انتهت اللعبة!':'Game Over!';
  document.getElementById('ov-msg').textContent=(currentLang==='ar'?'النقاط: ':'Score: ')+score;
  document.getElementById('start-btn').textContent=currentLang==='ar'?'▶ مرة أخرى':'▶ Play Again';
  document.getElementById('overlay').classList.add('show');
}

document.addEventListener('keydown',e=>{
  if(!running||paused)return;
  if(e.key==='ArrowLeft'){e.preventDefault();moveLeft();}
  if(e.key==='ArrowRight'){e.preventDefault();moveRight();}
  if(e.key==='ArrowDown'){e.preventDefault();softDrop();}
  if(e.key==='ArrowUp'){e.preventDefault();rotatePiece();}
  if(e.key===' '){e.preventDefault();hardDrop();}
  if(e.key==='p'||e.key==='P')togglePause();
});

// Touch swipe on canvas
let tx,ty;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!running||paused)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>20)moveRight();else if(dx<-20)moveLeft();}
  else{if(dy>20)softDrop();else if(dy<-20)rotatePiece();}
},{passive:true});

const t={ar:{title:'تيتريس',back:'← الرئيسية',score:'النقاط',level:'المستوى',lines:'الصفوف',best:'الأفضل',next:'التالي',drop:'⬇ إنزال',newgame:'🔄',again:'▶ مرة أخرى'},en:{title:'Tetris',back:'← Home',score:'Score',level:'Level',lines:'Lines',best:'Best',next:'Next',drop:'⬇ Drop',newgame:'🔄',again:'▶ Play Again'}};
let currentLang=localStorage.getItem('yallaplays_lang')||'ar';
function applyLang(l){
  currentLang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.documentElement.lang=l;
  document.getElementById('title-lbl').textContent=t[l].title;
  document.getElementById('back-lbl').textContent=t[l].back;
  document.getElementById('score-lbl').textContent=t[l].score;
  document.getElementById('level-lbl').textContent=t[l].level;
  document.getElementById('lines-lbl').textContent=t[l].lines;
  document.getElementById('best-lbl').textContent=t[l].best;
  document.getElementById('next-lbl').textContent=t[l].next;
  document.getElementById('drop-btn').textContent=t[l].drop;
  document.getElementById('lang-btn').textContent=l==='ar'?'EN':'عر';
}
function toggleLang(){applyLang(currentLang==='ar'?'en':'ar');localStorage.setItem('yallaplays_lang',currentLang);}
applyLang(currentLang);

// Show overlay on load
document.getElementById('overlay').classList.add('show');
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
</script>

<!-- Related & Comments -->
<section style="max-width:640px;margin:1.5rem auto;padding:0 1rem 2rem;">
  <!-- Related games -->
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;">
    <h3 style="font-size:0.95rem;font-weight:800;margin-bottom:1rem;color:var(--text-primary);" id="related-title">ألعاب مشابهة</h3>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;" id="related-games-list">
      <!-- filled by JS -->
    </div>
  </div>
  <!-- Disqus -->
  <div id="disqus_thread" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;"></div>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://yallaplay.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
</section>
<script>
// Related games
const allGames = [
  {href:'../games/snake.html',emoji:'🐍',name:'ثعبان'},
  {href:'../games/tictactoe.html',emoji:'❌',name:'إكس أو'},
  {href:'../games/memory.html',emoji:'🃏',name:'ذاكرة'},
  {href:'../games/2048.html',emoji:'🔢',name:'2048'},
  {href:'../games/flappy.html',emoji:'🐦',name:'الطائر'},
  {href:'../games/whackamole.html',emoji:'🔨',name:'اضرب الخلد'},
  {href:'../games/tetris.html',emoji:'🟦',name:'تيتريس'},
  {href:'../games/breakout.html',emoji:'🎯',name:'تحطيم الطوب'},
  {href:'../games/mathquiz.html',emoji:'🧮',name:'حساب'},
  {href:'../games/wordscramble.html',emoji:'📝',name:'كلمات'},
];
const current = window.location.pathname.split('/').pop();
const related = allGames.filter(g=>!g.href.includes(current)).slice(0,4);
const list = document.getElementById('related-games-list');
if(list) list.innerHTML = related.map(g=>`
  <a href="${g.href}" style="display:flex;flex-direction:column;align-items:center;gap:0.3rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;text-decoration:none;color:var(--text-primary);transition:all 0.2s;min-width:80px;text-align:center;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
    <span style="font-size:1.5rem">${g.emoji}</span>
    <span style="font-size:0.75rem;font-weight:700">${g.name}</span>
  </a>`).join('');

function shareGame() {
  const url = window.location.href;
  const title = document.title;
  if (navigator.share) {
    navigator.share({ title, url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.share-game-btn');
      btn.textContent = '\u2705';
      setTimeout(() => btn.textContent = '\ud83d\udce4', 2000);
    });
  }
}
</script>
</body>
</html>
