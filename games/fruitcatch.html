<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اصطياد الفاكهة / Fruit Catch - YallaPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #070711; --bg-card: #0e0e1f; --bg-elevated: #13132a;
    --border: #1e1e3f; --accent: #db2777; --accent-bright: #f472b6;
    --accent-glow: rgba(219,39,119,0.4); --gold: #f59e0b; --green: #10b981;
    --red: #ef4444; --text-primary: #f1f0ff; --text-secondary: #9ca3c8;
    --text-muted: #4b5280; --font-ar: 'Cairo', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg-deep); color:var(--text-primary); font-family:var(--font-ar); min-height:100vh; display:flex; flex-direction:column; }
  header { background:rgba(7,7,17,0.9); border-bottom:1px solid var(--border); padding:0 1.5rem; backdrop-filter:blur(20px); position:sticky; top:0; z-index:10; }
  .header-inner { max-width:600px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:60px; gap:1rem; }
  .back-btn { color:var(--text-secondary); text-decoration:none; font-size:0.85rem; font-weight:600; display:flex; align-items:center; gap:0.4rem; padding:0.4rem 0.8rem; border-radius:8px; border:1px solid var(--border); transition:all 0.2s; }
  .back-btn:hover { border-color:var(--accent); color:var(--accent-bright); }
  .game-header-title { font-size:1.1rem; font-weight:900; }
  .score-display { display:flex; gap:0.75rem; align-items:center; }
  .score-box { background:var(--bg-elevated); border:1px solid var(--border); border-radius:8px; padding:0.3rem 0.7rem; text-align:center; }
  .score-val { font-size:1rem; font-weight:900; color:var(--accent-bright); display:block; }
  .score-lbl { font-size:0.65rem; color:var(--text-muted); }
  .lang-btn { background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-primary); padding:0.3rem 0.6rem; border-radius:6px; font-family:var(--font-ar); font-weight:700; font-size:0.8rem; cursor:pointer; }
  .share-game-btn { background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-secondary); width:34px; height:34px; border-radius:8px; cursor:pointer; font-size:1rem; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
  .share-game-btn:hover { border-color:var(--accent); color:var(--accent-bright); }
  main { flex:1; display:flex; flex-direction:column; align-items:center; padding:1.5rem 1rem; gap:1rem; }
  #game-container { position:relative; }
  canvas { border:2px solid var(--border); border-radius:12px; display:block; background:#0d0d1a; box-shadow:0 0 30px var(--accent-glow); }
  #overlay { position:absolute; inset:0; background:rgba(7,7,17,0.92); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; backdrop-filter:blur(8px); }
  #overlay h2 { font-size:1.8rem; font-weight:900; }
  .overlay-sub { font-size:0.9rem; color:var(--text-secondary); text-align:center; }
  .start-btn { background:linear-gradient(135deg,var(--accent),var(--accent-bright)); color:white; border:none; padding:0.75rem 2rem; border-radius:10px; font-family:var(--font-ar); font-size:1rem; font-weight:700; cursor:pointer; box-shadow:0 4px 20px var(--accent-glow); transition:all 0.2s; }
  .start-btn:hover { transform:translateY(-2px); }
  .lives-display { display:flex; gap:0.35rem; font-size:1.2rem; }
  .ctrl-row { display:flex; gap:1rem; }
  .ctrl-btn { background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-primary); width:70px; height:56px; border-radius:10px; font-size:1.3rem; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; font-weight:900; }
  .ctrl-btn:hover, .ctrl-btn:active { background:var(--accent); border-color:var(--accent); transform:scale(0.95); }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="../index.html" class="back-btn" id="back-lbl">← الرئيسية</a>
    <span class="game-header-title">🍓 <span id="title-lbl">اصطياد الفاكهة</span></span>
    <div class="score-display">
      <div class="score-box">
        <span class="score-val" id="score">0</span>
        <span class="score-lbl" id="score-lbl">النقاط</span>
      </div>
      <div class="score-box">
        <span class="score-val" id="high-score">0</span>
        <span class="score-lbl" id="best-lbl">الأفضل</span>
      </div>
      <button class="share-game-btn" onclick="shareGame()" title="مشاركة">📤</button>
      <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
    </div>
  </div>
</header>

<main>
  <div id="game-container">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div style="font-size:3rem">🍓</div>
      <h2 id="overlay-title">اصطياد الفاكهة</h2>
      <div class="overlay-sub" id="overlay-msg">حرّك السلة لاصطياد الفاكهة!</div>
      <div class="lives-display" id="lives-display">❤️❤️❤️</div>
      <button class="start-btn" id="start-btn" onclick="startGame()">▶ ابدأ</button>
    </div>
  </div>

  <div class="ctrl-row">
    <button class="ctrl-btn" id="left-btn" onpointerdown="moveLeft=true" onpointerup="moveLeft=false" ontouchstart="moveLeft=true;event.preventDefault()" ontouchend="moveLeft=false">◄</button>
    <button class="ctrl-btn" id="right-btn" onpointerdown="moveRight=true" onpointerup="moveRight=false" ontouchstart="moveRight=true;event.preventDefault()" ontouchend="moveRight=false">►</button>
  </div>
</main>

<div class="ad-zone" style="padding:1rem 2rem;text-align:center;border-top:1px solid #1e1e3f;background:rgba(14,14,31,0.5);">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="3333333333" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- Related & Comments -->
<section style="max-width:640px;margin:1.5rem auto;padding:0 1rem 2rem;">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;">
    <h3 style="font-size:0.95rem;font-weight:800;margin-bottom:1rem;color:var(--text-primary);" id="related-title">ألعاب مشابهة</h3>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;" id="related-games-list"></div>
  </div>
  <div id="disqus_thread" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;"></div>
  <script>
    var disqus_config = function () { this.page.url = window.location.href; this.page.identifier = window.location.pathname; };
    (function() { var d = document, s = d.createElement('script'); s.src = 'https://yallaplay.disqus.com/embed.js'; s.setAttribute('data-timestamp', +new Date()); (d.head || d.body).appendChild(s); })();
  </script>
</section>
<script>
const allGames=[{href:'../games/snake.html',emoji:'🐍',name:'ثعبان'},{href:'../games/tictactoe.html',emoji:'❌',name:'إكس أو'},{href:'../games/memory.html',emoji:'🃏',name:'ذاكرة'},{href:'../games/2048.html',emoji:'🔢',name:'2048'},{href:'../games/flappy.html',emoji:'🐦',name:'الطائر'},{href:'../games/balloonpop.html',emoji:'🎈',name:'بالونات'},{href:'../games/colorpaint.html',emoji:'🎨',name:'تلوين'},{href:'../games/bubbleshooter.html',emoji:'🫧',name:'فقاعات'}];
const current=window.location.pathname.split('/').pop();
const related=allGames.filter(g=>!g.href.includes(current)).slice(0,4);
const list=document.getElementById('related-games-list');
if(list)list.innerHTML=related.map(g=>`<a href="${g.href}" style="display:flex;flex-direction:column;align-items:center;gap:0.3rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;text-decoration:none;color:var(--text-primary);transition:all 0.2s;min-width:80px;text-align:center;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><span style="font-size:1.5rem">${g.emoji}</span><span style="font-size:0.75rem;font-weight:700">${g.name}</span></a>`).join('');
</script>

<script>
// Canvas setup
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = Math.min(400, window.innerWidth * 0.95);
let H = Math.min(520, window.innerHeight * 0.6);
canvas.width = W; canvas.height = H;

// Game state
let score, highScore, lives, items, basketX, falling, gameRunning, raf, caught, level;
highScore = parseInt(localStorage.getItem('fruitcatch_hs') || '0');
document.getElementById('high-score').textContent = highScore;
let moveLeft = false, moveRight = false;
const BASKET_W = W * 0.22, BASKET_H = 28;
const fruits = ['🍓','🍊','🍋','🍇','🍎','🍑','🍒','🍍'];
let frameCount = 0;
let spawnInterval = 60; // frames

function startGame() {
  score = 0; lives = 3; caught = 0; level = 1;
  items = []; basketX = W/2 - BASKET_W/2;
  document.getElementById('score').textContent = 0;
  document.getElementById('overlay').style.display = 'none';
  gameRunning = true; frameCount = 0; spawnInterval = 60;
  if (raf) cancelAnimationFrame(raf);
  loop();
}

function loop() {
  if (!gameRunning) return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

function update() {
  frameCount++;
  // Move basket
  const speed = W * 0.02;
  if (moveLeft) basketX = Math.max(0, basketX - speed);
  if (moveRight) basketX = Math.min(W - BASKET_W, basketX + speed);

  // Spawn items
  if (frameCount % spawnInterval === 0) {
    const isBomb = Math.random() < 0.18;
    items.push({
      x: Math.random() * (W - 40) + 20,
      y: -30,
      emoji: isBomb ? '💣' : fruits[Math.floor(Math.random() * fruits.length)],
      isBomb,
      speed: 2.5 + Math.random() * 2 + level * 0.3
    });
  }

  // Update items
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += item.speed;

    // Check catch
    const basketTop = H - BASKET_H - 20;
    if (item.y + 25 >= basketTop && item.x >= basketX - 10 && item.x <= basketX + BASKET_W + 10) {
      items.splice(i, 1);
      if (item.isBomb) {
        lives--;
        showHit();
      } else {
        score += 10;
        caught++;
        document.getElementById('score').textContent = score;
        if (score > highScore) { highScore = score; localStorage.setItem('fruitcatch_hs', highScore); document.getElementById('high-score').textContent = highScore; }
        // Level up every 10 fruits
        if (caught % 10 === 0) { level++; spawnInterval = Math.max(25, spawnInterval - 5); }
      }
      continue;
    }

    // Missed
    if (item.y > H + 10) {
      items.splice(i, 1);
      if (!item.isBomb) { lives--; showHit(); }
    }
  }

  if (lives <= 0) gameOver();
  updateLivesDisplay();
}

function showHit() {
  canvas.style.boxShadow = '0 0 40px rgba(239,68,68,0.8)';
  setTimeout(() => canvas.style.boxShadow = '0 0 30px var(--accent-glow)', 300);
}

function updateLivesDisplay() {
  document.getElementById('lives-display').textContent = '❤️'.repeat(Math.max(0, lives));
}

function gameOver() {
  gameRunning = false;
  const ot = document.getElementById('overlay-title');
  const om = document.getElementById('overlay-msg');
  const sb = document.getElementById('start-btn');
  ot.textContent = currentLang === 'ar' ? 'انتهت اللعبة!' : 'Game Over!';
  om.textContent = (currentLang === 'ar' ? 'نقاطك: ' : 'Score: ') + score;
  sb.textContent = currentLang === 'ar' ? '▶ العب مجدداً' : '▶ Play Again';
  document.getElementById('overlay').style.display = 'flex';
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0d0820');
  bg.addColorStop(1, '#1a0030');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Draw items
  ctx.font = '1.6rem Arial';
  ctx.textAlign = 'center';
  for (const item of items) {
    ctx.fillText(item.emoji, item.x, item.y + 20);
  }

  // Draw basket
  const bY = H - BASKET_H - 20;
  const grad = ctx.createLinearGradient(basketX, bY, basketX + BASKET_W, bY + BASKET_H);
  grad.addColorStop(0, '#db2777');
  grad.addColorStop(1, '#f472b6');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(basketX, bY, BASKET_W, BASKET_H, 8);
  ctx.fill();

  // Basket emoji
  ctx.font = '1.1rem Arial';
  ctx.fillText('🧺', basketX + BASKET_W/2, bY + 20);
}

// Mouse control
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  basketX = (e.clientX - rect.left) - BASKET_W / 2;
  basketX = Math.max(0, Math.min(W - BASKET_W, basketX));
});

// Touch control
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  basketX = (e.touches[0].clientX - rect.left) - BASKET_W / 2;
  basketX = Math.max(0, Math.min(W - BASKET_W, basketX));
}, { passive: false });

// ======= i18n =======
const i18n = {
  ar: { back:'← الرئيسية', title:'اصطياد الفاكهة', score:'النقاط', best:'الأفضل', start:'▶ ابدأ', related:'ألعاب مشابهة' },
  en: { back:'← Home', title:'Fruit Catch', score:'Score', best:'Best', start:'▶ Start', related:'Similar Games' }
};
let currentLang = localStorage.getItem('yallaplays_lang') || 'ar';
function applyLang(lang) {
  currentLang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  const t = i18n[lang];
  document.getElementById('back-lbl').textContent = t.back;
  document.getElementById('title-lbl').textContent = t.title;
  document.getElementById('score-lbl').textContent = t.score;
  document.getElementById('best-lbl').textContent = t.best;
  document.getElementById('overlay-title').textContent = t.title;
  document.getElementById('start-btn').textContent = t.start;
  document.getElementById('related-title').textContent = t.related;
  document.getElementById('lang-btn').textContent = lang === 'ar' ? 'EN' : 'عر';
}
function toggleLang() { applyLang(currentLang === 'ar' ? 'en' : 'ar'); }
applyLang(currentLang);

function shareGame() {
  const url = window.location.href;
  const title = document.title;
  if (navigator.share) { navigator.share({ title, url }); }
  else { navigator.clipboard.writeText(url).then(() => { const btn = document.querySelector('.share-game-btn'); btn.textContent = '✅'; setTimeout(() => btn.textContent = '📤', 2000); }); }
}

// Initial draw
draw();
</script>
</body>
</html>
