<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Drift Boss Lite</title><style>*{box-sizing:border-box}body{margin:0;background:#070711;color:#fff;font-family:Arial,Tahoma,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}.wrap{width:min(980px,100%)}a{color:#a855f7}.top,.hud{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.panel{background:#101025;border:1px solid #24244a;border-radius:18px;overflow:hidden}.hud{padding:12px 16px;border-bottom:1px solid #24244a}.game{height:min(72vh,620px);min-height:460px;background:#0b1026}canvas{display:block;width:100%;height:100%;touch-action:none}.btn{border:0;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;padding:10px 16px;font-weight:800;cursor:pointer}.note{color:#9ca3c8;font-size:13px}</style></head><body><div class="wrap"><div class="top"><h2>🎮 Drift Boss Lite</h2><a href="../index.html">رجوع</a></div><div class="panel"><div class="hud"><span id="score">النقاط: 0</span><span id="best">الأفضل: 0</span><button class="btn" onclick="restart()">إعادة</button></div><div class="game"><canvas id="c"></canvas></div></div><p class="note">كيبورد: الأسهم/WASD/مسافة — موبايل: لمس أو سحب.</p></div><script>const c=document.getElementById('c'),x=c.getContext('2d'),S=document.getElementById('score'),B=document.getElementById('best');let W,H,p,o=[],s=0,b=+localStorage.bc||0,v,dir=0,over=false,t=0;B.textContent='الأفضل: '+b;function fit(){W=c.width=c.clientWidth*devicePixelRatio;H=c.height=c.clientHeight*devicePixelRatio}onresize=fit;fit();function restart(){p={x:W/2,y:H-90*devicePixelRatio};o=[];s=0;v=6*devicePixelRatio;over=false;loop()}function spawn(){o.push({x:W*.25+Math.random()*W*.5,y:-80*devicePixelRatio})}function draw(){x.fillStyle='#07111d';x.fillRect(0,0,W,H);x.fillStyle='#24283f';x.fillRect(W*.22,0,W*.56,H);x.font=46*devicePixelRatio+'px Arial';o.forEach(r=>x.fillText('🚗',r.x,r.y));x.font=52*devicePixelRatio+'px Arial';x.fillText('🏎️',p.x-28*devicePixelRatio,p.y)}function loop(){if(over)return;t++;if(t%44==0)spawn();p.x+=dir*8*devicePixelRatio;p.x=Math.max(W*.24,Math.min(W*.76,p.x));o.forEach(r=>r.y+=v);o=o.filter(r=>r.y<H+80);s++;v+=.004*devicePixelRatio;S.textContent='النقاط: '+s;for(const r of o){if(Math.abs(p.x-r.x)<55*devicePixelRatio&&Math.abs(p.y-r.y)<70*devicePixelRatio){over=true;b=Math.max(b,s);localStorage.bc=b;B.textContent='الأفضل: '+b;draw();x.fillStyle='rgba(0,0,0,.7)';x.fillRect(0,0,W,H);x.fillStyle='#fff';x.textAlign='center';x.font=36*devicePixelRatio+'px Arial';x.fillText('تصادم!',W/2,H/2);return}}draw();requestAnimationFrame(loop)}onkeydown=e=>{if(e.key=='ArrowLeft'||e.key=='a')dir=-1;if(e.key=='ArrowRight'||e.key=='d')dir=1;if(e.key=='Enter')restart()};onkeyup=e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))dir=0};c.onpointermove=e=>{let r=c.getBoundingClientRect();p.x=(e.clientX-r.left)*devicePixelRatio};restart();</script></body></html>
