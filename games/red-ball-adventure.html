<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Red Ball Adventure</title><style>*{box-sizing:border-box}body{margin:0;background:#070711;color:#fff;font-family:Arial,Tahoma,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}.wrap{width:min(980px,100%)}a{color:#a855f7}.top,.hud{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.panel{background:#101025;border:1px solid #24244a;border-radius:18px;overflow:hidden}.hud{padding:12px 16px;border-bottom:1px solid #24244a}.game{height:min(72vh,620px);min-height:460px;background:#0b1026}canvas{display:block;width:100%;height:100%;touch-action:none}.btn{border:0;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;padding:10px 16px;font-weight:800;cursor:pointer}.note{color:#9ca3c8;font-size:13px}</style></head><body><div class="wrap"><div class="top"><h2>🎮 Red Ball Adventure</h2><a href="../index.html">رجوع</a></div><div class="panel"><div class="hud"><span id="score">النقاط: 0</span><span id="best">الأفضل: 0</span><button class="btn" onclick="restart()">إعادة</button></div><div class="game"><canvas id="c"></canvas></div></div><p class="note">كيبورد: الأسهم/WASD/مسافة — موبايل: لمس أو سحب.</p></div><script>const c=document.getElementById('c'),x=c.getContext('2d'),S=document.getElementById('score'),B=document.getElementById('best');let W,H,p,pl=[],s=0,b=+localStorage.bb||0,k={};B.textContent='الأفضل: '+b;function fit(){W=c.width=c.clientWidth*devicePixelRatio;H=c.height=c.clientHeight*devicePixelRatio}onresize=fit;fit();function restart(){p={x:70*devicePixelRatio,y:H-100*devicePixelRatio,r:22*devicePixelRatio,vy:0};pl=[];for(let i=0;i<9;i++)pl.push({x:i*170*devicePixelRatio,y:H-(60+Math.random()*230)*devicePixelRatio,w:135*devicePixelRatio,h:22*devicePixelRatio});s=0;loop()}function draw(){x.fillStyle='#101827';x.fillRect(0,0,W,H);x.fillStyle='#10b981';pl.forEach(a=>x.fillRect(a.x,a.y,a.w,a.h));x.font=44*devicePixelRatio+'px Arial';x.fillText('🔴',p.x-p.r,p.y+p.r)}function loop(){p.x+=(k.l?-5:k.r?5:0)*devicePixelRatio;p.vy+=.55*devicePixelRatio;p.y+=p.vy;pl.forEach(a=>{if(p.x+p.r>a.x&&p.x-p.r<a.x+a.w&&p.y+p.r>a.y&&p.y+p.r<a.y+a.h+20*devicePixelRatio&&p.vy>0){p.y=a.y-p.r;p.vy=0}});if(p.x>W*.65){let d=p.x-W*.65;p.x-=d;pl.forEach(a=>a.x-=d);s+=Math.floor(d/devicePixelRatio)}pl.forEach(a=>{if(a.x+a.w<0){a.x=W+Math.random()*120*devicePixelRatio;a.y=H-(60+Math.random()*250)*devicePixelRatio}});if(p.y>H+80*devicePixelRatio){b=Math.max(b,s);localStorage.bb=b;B.textContent='الأفضل: '+b;restart();return}S.textContent='النقاط: '+s;draw();requestAnimationFrame(loop)}onkeydown=e=>{if(e.key=='ArrowLeft'||e.key=='a')k.l=1;if(e.key=='ArrowRight'||e.key=='d')k.r=1;if((e.key=='ArrowUp'||e.key==' '||e.key=='w')&&p.vy==0)p.vy=-13*devicePixelRatio};onkeyup=e=>{if(e.key=='ArrowLeft'||e.key=='a')k.l=0;if(e.key=='ArrowRight'||e.key=='d')k.r=0};c.onpointerdown=()=>{k.r=1;if(p.vy==0)p.vy=-13*devicePixelRatio};c.onpointerup=()=>k.r=0;restart();</script></body></html>
