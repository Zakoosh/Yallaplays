<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Subway Runner</title><style>*{box-sizing:border-box}body{margin:0;background:#070711;color:#fff;font-family:Arial,Tahoma,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}.wrap{width:min(980px,100%)}a{color:#a855f7}.top,.hud{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.panel{background:#101025;border:1px solid #24244a;border-radius:18px;overflow:hidden}.hud{padding:12px 16px;border-bottom:1px solid #24244a}.game{height:min(72vh,620px);min-height:460px;background:#0b1026}canvas{display:block;width:100%;height:100%;touch-action:none}.btn{border:0;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;padding:10px 16px;font-weight:800;cursor:pointer}.note{color:#9ca3c8;font-size:13px}</style></head><body><div class="wrap"><div class="top"><h2>🎮 Subway Runner</h2><a href="../index.html">رجوع</a></div><div class="panel"><div class="hud"><span id="score">النقاط: 0</span><span id="best">الأفضل: 0</span><button class="btn" onclick="restart()">إعادة</button></div><div class="game"><canvas id="c"></canvas></div></div><p class="note">كيبورد: الأسهم/WASD/مسافة — موبايل: لمس أو سحب.</p></div><script>const c=document.getElementById('c'),x=c.getContext('2d'),S=document.getElementById('score'),B=document.getElementById('best');let W,H,p,o=[],co=[],s=0,b=+localStorage.br||0,v,over=false,t=0;B.textContent='الأفضل: '+b;function fit(){W=c.width=c.clientWidth*devicePixelRatio;H=c.height=c.clientHeight*devicePixelRatio}onresize=fit;fit();function lx(l){return W/2+(l-1)*W*.22}function restart(){p={l:1,j:0,vy:0};o=[];co=[];s=0;v=7*devicePixelRatio;over=false;loop()}function spawn(){let l=Math.floor(Math.random()*3);o.push({l,y:-70*devicePixelRatio});if(Math.random()<.6)co.push({l:(l+1)%3,y:-150*devicePixelRatio})}function draw(){x.fillStyle='#08101f';x.fillRect(0,0,W,H);for(let i=0;i<3;i++){x.fillStyle=i==1?'#24245a':'#18183a';x.fillRect(lx(i)-W*.09,0,W*.18,H)}o.forEach(r=>{x.font=46*devicePixelRatio+'px Arial';x.fillText('🚧',lx(r.l)-25*devicePixelRatio,r.y+45*devicePixelRatio)});co.forEach(r=>{x.font=30*devicePixelRatio+'px Arial';x.fillText('🟡',lx(r.l)-16*devicePixelRatio,r.y)});x.font=44*devicePixelRatio+'px Arial';x.fillText('🏃',lx(p.l)-24*devicePixelRatio,H-95*devicePixelRatio-p.j)}function loop(){if(over)return;t++;if(t%52==0)spawn();p.j+=p.vy;p.vy-=.9*devicePixelRatio;if(p.j<0){p.j=0;p.vy=0}o.forEach(r=>r.y+=v);co.forEach(r=>r.y+=v);o=o.filter(r=>r.y<H+80);co=co.filter(r=>{if(r.l==p.l&&Math.abs(r.y-(H-120*devicePixelRatio-p.j))<55*devicePixelRatio){s+=20;return false}return r.y<H+50});s++;v+=.003*devicePixelRatio;S.textContent='النقاط: '+s;for(const r of o){if(r.l==p.l&&Math.abs(r.y-(H-120*devicePixelRatio-p.j))<55*devicePixelRatio){over=true;b=Math.max(b,s);localStorage.br=b;B.textContent='الأفضل: '+b;draw();x.fillStyle='rgba(0,0,0,.7)';x.fillRect(0,0,W,H);x.fillStyle='#fff';x.textAlign='center';x.font=36*devicePixelRatio+'px Arial';x.fillText('انتهت اللعبة',W/2,H/2);return}}draw();requestAnimationFrame(loop)}onkeydown=e=>{if(e.key=='ArrowLeft'||e.key=='a')p.l=Math.max(0,p.l-1);if(e.key=='ArrowRight'||e.key=='d')p.l=Math.min(2,p.l+1);if((e.key=='ArrowUp'||e.key==' '||e.key=='w')&&p.j==0)p.vy=17*devicePixelRatio;if(e.key=='Enter')restart()};let sx=0;c.onpointerdown=e=>sx=e.clientX;c.onpointerup=e=>{let d=e.clientX-sx;if(Math.abs(d)>25)p.l+=d>0?-1:1;else if(p.j==0)p.vy=17*devicePixelRatio;p.l=Math.max(0,Math.min(2,p.l))};restart();</script></body></html>
