<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطابق الذاكرة / Memory Match - YallaPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:#070711;--bg-card:#0e0e1f;--bg-elevated:#13132a;
    --border:#1e1e3f;--accent:#7c3aed;--accent-bright:#a855f7;
    --accent-glow:rgba(124,58,237,0.4);--gold:#f59e0b;--green:#10b981;
    --red:#ef4444;--text-primary:#f1f0ff;--text-secondary:#9ca3c8;
    --text-muted:#4b5280;--font-ar:'Cairo',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-ar);min-height:100vh;display:flex;flex-direction:column;}
  header{background:rgba(7,7,17,0.9);border-bottom:1px solid var(--border);padding:0 1.5rem;backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;}
  .header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem;}
  .back-btn{color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .lang-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.3rem 0.6rem;border-radius:6px;font-family:var(--font-ar);font-weight:700;font-size:0.8rem;cursor:pointer;}
  main{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem;gap:1rem;}
  .stats-row{display:flex;gap:0.75rem;align-items:center;}
  .stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:0.5rem 1rem;text-align:center;}
  .stat-val{font-size:1.1rem;font-weight:900;color:var(--accent-bright);display:block;}
  .stat-lbl{font-size:0.68rem;color:var(--text-muted);}
  .diff-row{display:flex;gap:0.5rem;}
  .diff-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);padding:0.4rem 0.9rem;border-radius:8px;font-family:var(--font-ar);font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .diff-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
  .diff-btn:hover:not(.active){border-color:var(--accent);color:var(--accent-bright);}
  #board{display:grid;gap:8px;width:min(480px,95vw);}
  .card{
    background:var(--bg-elevated);border:2px solid var(--border);border-radius:10px;
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform 0.35s;transform-style:preserve-3d;position:relative;
    font-size:clamp(1.4rem,5vw,2.2rem);user-select:none;
  }
  .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.4s cubic-bezier(.4,0,.2,1);}
  .card.flipped .card-inner{transform:rotateY(180deg);}
  .card-front,.card-back{position:absolute;inset:0;border-radius:8px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;}
  .card-front{background:var(--bg-elevated);font-size:1.5rem;color:var(--border);}
  .card-back{background:var(--bg-card);border:1px solid var(--accent);transform:rotateY(180deg);font-size:clamp(1.4rem,5vw,2.2rem);}
  .card.matched .card-inner{transform:rotateY(180deg);}
  .card.matched .card-back{background:rgba(16,185,129,0.15);border-color:var(--green);}
  .btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.6rem 1.5rem;border-radius:10px;font-family:var(--font-ar);font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-bright));color:white;border:none;box-shadow:0 4px 15px var(--accent-glow);}
  .btn-primary:hover{transform:translateY(-1px);color:white;}
  #win-overlay{display:none;position:fixed;inset:0;background:rgba(7,7,17,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:1rem;}
  #win-overlay.show{display:flex;}
  #win-overlay h2{font-size:2rem;font-weight:900;}
  .win-stats{display:flex;gap:1rem;}

  .share-game-btn { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .share-game-btn:hover { border-color: var(--accent); color: var(--accent-bright); }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="../index.html" class="back-btn" id="back-lbl">← الرئيسية</a>
    <span style="font-size:1.1rem;font-weight:900;">🃏 <span id="title-lbl">تطابق الذاكرة</span></span>
    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
  </div>
</header>

<main>
  <div class="stats-row">
    <div class="stat-box"><span class="stat-val" id="moves">0</span><span class="stat-lbl" id="moves-lbl">خطوات</span></div>
    <div class="stat-box"><span class="stat-val" id="timer">0:00</span><span class="stat-lbl" id="time-lbl">الوقت</span></div>
    <div class="stat-box"><span class="stat-val" id="pairs">0</span><span class="stat-lbl" id="pairs-lbl">أزواج</span></div>
  </div>

  <div class="diff-row">
    <button class="diff-btn" onclick="setDiff(3,4)" id="easy-btn">سهل (3×4)</button>
    <button class="diff-btn active" onclick="setDiff(4,4)" id="med-btn">متوسط (4×4)</button>
    <button class="diff-btn" onclick="setDiff(4,5)" id="hard-btn">صعب (4×5)</button>
  </div>

  <div id="board"></div>

  <button class="btn btn-primary" onclick="startGame()" id="new-btn">🔄 لعبة جديدة</button>
</main>

<div class="ad-zone" style="padding:1rem 2rem;text-align:center;border-top:1px solid #1e1e3f;background:rgba(14,14,31,0.5);">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="3333333333"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="win-overlay">
  <div style="font-size:4rem">🎉</div>
  <h2 id="win-title">أحسنت!</h2>
  <div class="win-stats">
    <div class="stat-box"><span class="stat-val" id="fin-moves">0</span><span class="stat-lbl" id="fin-moves-lbl">خطوات</span></div>
    <div class="stat-box"><span class="stat-val" id="fin-time">0:00</span><span class="stat-lbl" id="fin-time-lbl">الوقت</span></div>
  </div>
  <button class="btn btn-primary" onclick="startGame();document.getElementById('win-overlay').classList.remove('show');" id="win-btn">▶ مرة أخرى</button>
</div>

<script>
const EMOJIS=['🎮','🎯','🎲','🃏','🎪','🎨','🎭','🎬','🏆','🚀','⭐','💎','🔮','🌟','🦄','🎵','🌈','🔥','⚡','💫'];
let cols=4,rows=4,cards=[],flipped=[],matched=0,moves=0,timerInt,seconds=0,canFlip=true;

function setDiff(c,r){
  cols=c;rows=r;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  startGame();
}

function startGame(){
  clearInterval(timerInt);
  moves=0;matched=0;seconds=0;flipped=[];canFlip=true;
  document.getElementById('moves').textContent=0;
  document.getElementById('pairs').textContent=0;
  document.getElementById('timer').textContent='0:00';
  const total=cols*rows;
  const pairs=total/2;
  const pool=[...EMOJIS].slice(0,pairs);
  cards=[...pool,...pool].sort(()=>Math.random()-0.5);
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  board.innerHTML='';
  cards.forEach((em,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.idx=i;
    card.dataset.val=em;
    card.innerHTML=`<div class="card-inner"><div class="card-front">🎮</div><div class="card-back">${em}</div></div>`;
    card.addEventListener('click',()=>flipCard(card));
    board.appendChild(card);
  });
  timerInt=setInterval(()=>{seconds++;const m=Math.floor(seconds/60),s=seconds%60;document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;},1000);
}

function flipCard(card){
  if(!canFlip||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    moves++;document.getElementById('moves').textContent=moves;
    canFlip=false;
    setTimeout(checkMatch,700);
  }
}

function checkMatch(){
  const [a,b]=flipped;
  if(a.dataset.val===b.dataset.val){
    a.classList.add('matched');b.classList.add('matched');
    matched++;document.getElementById('pairs').textContent=matched;
    if(matched===cols*rows/2){clearInterval(timerInt);showWin();}
  } else {
    a.classList.remove('flipped');b.classList.remove('flipped');
  }
  flipped=[];canFlip=true;
}

function showWin(){
  const m=Math.floor(seconds/60),s=seconds%60;
  document.getElementById('fin-moves').textContent=moves;
  document.getElementById('fin-time').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('win-overlay').classList.add('show');
}

const t={
  ar:{title:'تطابق الذاكرة',back:'← الرئيسية',moves:'خطوات',time:'الوقت',pairs:'أزواج',easy:'سهل (3×4)',med:'متوسط (4×4)',hard:'صعب (4×5)',newgame:'🔄 لعبة جديدة',win:'أحسنت!',again:'▶ مرة أخرى'},
  en:{title:'Memory Match',back:'← Home',moves:'Moves',time:'Time',pairs:'Pairs',easy:'Easy (3×4)',med:'Medium (4×4)',hard:'Hard (4×5)',newgame:'🔄 New Game',win:'Well Done!',again:'▶ Play Again'}
};
let currentLang=localStorage.getItem('yallaplays_lang')||'ar';
function applyLang(l){
  currentLang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.documentElement.lang=l;
  document.getElementById('title-lbl').textContent=t[l].title;
  document.getElementById('back-lbl').textContent=t[l].back;
  document.getElementById('moves-lbl').textContent=t[l].moves;
  document.getElementById('time-lbl').textContent=t[l].time;
  document.getElementById('pairs-lbl').textContent=t[l].pairs;
  document.getElementById('easy-btn').textContent=t[l].easy;
  document.getElementById('med-btn').textContent=t[l].med;
  document.getElementById('hard-btn').textContent=t[l].hard;
  document.getElementById('new-btn').textContent=t[l].newgame;
  document.getElementById('win-title').textContent=t[l].win;
  document.getElementById('win-btn').textContent=t[l].again;
  document.getElementById('fin-moves-lbl').textContent=t[l].moves;
  document.getElementById('fin-time-lbl').textContent=t[l].time;
  document.getElementById('lang-btn').textContent=l==='ar'?'EN':'عر';
}
function toggleLang(){applyLang(currentLang==='ar'?'en':'ar');localStorage.setItem('yallaplays_lang',currentLang);}
applyLang(currentLang);
startGame();
</script>

<!-- Related & Comments -->
<section style="max-width:640px;margin:1.5rem auto;padding:0 1rem 2rem;">
  <!-- Related games -->
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;">
    <h3 style="font-size:0.95rem;font-weight:800;margin-bottom:1rem;color:var(--text-primary);" id="related-title">ألعاب مشابهة</h3>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;" id="related-games-list">
      <!-- filled by JS -->
    </div>
  </div>
  <!-- Disqus -->
  <div id="disqus_thread" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;"></div>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://yallaplay.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
</section>
<script>
// Related games
const allGames = [
  {href:'../games/snake.html',emoji:'🐍',name:'ثعبان'},
  {href:'../games/tictactoe.html',emoji:'❌',name:'إكس أو'},
  {href:'../games/memory.html',emoji:'🃏',name:'ذاكرة'},
  {href:'../games/2048.html',emoji:'🔢',name:'2048'},
  {href:'../games/flappy.html',emoji:'🐦',name:'الطائر'},
  {href:'../games/whackamole.html',emoji:'🔨',name:'اضرب الخلد'},
  {href:'../games/tetris.html',emoji:'🟦',name:'تيتريس'},
  {href:'../games/breakout.html',emoji:'🎯',name:'تحطيم الطوب'},
  {href:'../games/mathquiz.html',emoji:'🧮',name:'حساب'},
  {href:'../games/wordscramble.html',emoji:'📝',name:'كلمات'},
];
const current = window.location.pathname.split('/').pop();
const related = allGames.filter(g=>!g.href.includes(current)).slice(0,4);
const list = document.getElementById('related-games-list');
if(list) list.innerHTML = related.map(g=>`
  <a href="${g.href}" style="display:flex;flex-direction:column;align-items:center;gap:0.3rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;text-decoration:none;color:var(--text-primary);transition:all 0.2s;min-width:80px;text-align:center;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
    <span style="font-size:1.5rem">${g.emoji}</span>
    <span style="font-size:0.75rem;font-weight:700">${g.name}</span>
  </a>`).join('');

function shareGame() {
  const url = window.location.href;
  const title = document.title;
  if (navigator.share) {
    navigator.share({ title, url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.share-game-btn');
      btn.textContent = '\u2705';
      setTimeout(() => btn.textContent = '\ud83d\udce4', 2000);
    });
  }
}
</script>
</body>
</html>
