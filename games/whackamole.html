<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اضرب الخلد / Whack-A-Mole - YallaPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg-deep:#070711;--bg-card:#0e0e1f;--bg-elevated:#13132a;--border:#1e1e3f;--accent:#7c3aed;--accent-bright:#a855f7;--accent-glow:rgba(124,58,237,0.4);--gold:#f59e0b;--green:#10b981;--red:#ef4444;--text-primary:#f1f0ff;--text-secondary:#9ca3c8;--text-muted:#4b5280;--font-ar:'Cairo',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-ar);min-height:100vh;display:flex;flex-direction:column;}
  header{background:rgba(7,7,17,0.9);border-bottom:1px solid var(--border);padding:0 1.5rem;backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;}
  .header-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem;}
  .back-btn{color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .lang-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.3rem 0.6rem;border-radius:6px;font-family:var(--font-ar);font-weight:700;font-size:0.8rem;cursor:pointer;}
  main{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem;gap:1rem;}
  .stats{display:flex;gap:0.75rem;}
  .stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:0.5rem 1rem;text-align:center;min-width:70px;}
  .stat-val{font-size:1.2rem;font-weight:900;color:var(--accent-bright);display:block;}
  .stat-lbl{font-size:0.65rem;color:var(--text-muted);}
  .timer-bar-wrap{width:min(440px,95vw);background:var(--bg-elevated);border-radius:8px;height:10px;overflow:hidden;border:1px solid var(--border);}
  #timer-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-bright));border-radius:8px;transition:width 0.9s linear,background 0.3s;}
  #grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:min(420px,95vw);}
  .hole{
    background:var(--bg-card);border:2px solid var(--border);border-radius:16px;
    aspect-ratio:1;display:flex;align-items:flex-end;justify-content:center;
    overflow:hidden;cursor:pointer;position:relative;transition:border-color 0.15s;
    user-select:none;
  }
  .hole:active{border-color:var(--accent);}
  .mole{
    font-size:clamp(2.2rem,8vw,3.2rem);
    transform:translateY(100%);transition:transform 0.18s cubic-bezier(.34,1.56,.64,1);
    padding-bottom:4px;pointer-events:none;
    line-height:1;
  }
  .hole.up .mole{transform:translateY(0);}
  .hole.whacked .mole{transform:translateY(100%);}
  .hit-flash{position:absolute;inset:0;background:rgba(239,68,68,0.35);border-radius:14px;opacity:0;pointer-events:none;}
  .hole.whacked .hit-flash{animation:flash 0.3s ease;}
  @keyframes flash{0%{opacity:1;}100%{opacity:0;}}
  .miss-flash{position:absolute;inset:0;background:rgba(124,58,237,0.2);border-radius:14px;opacity:0;pointer-events:none;}
  .hole.missed .miss-flash{animation:flash 0.25s ease;}
  .score-pop{position:absolute;top:20%;left:50%;transform:translateX(-50%);font-size:1.4rem;font-weight:900;color:var(--green);pointer-events:none;animation:popUp 0.5s ease forwards;}
  @keyframes popUp{0%{opacity:1;transform:translateX(-50%) translateY(0);}100%{opacity:0;transform:translateX(-50%) translateY(-40px);}}
  .btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.6rem 1.5rem;border-radius:10px;font-family:var(--font-ar);font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-bright));color:white;border:none;box-shadow:0 4px 15px var(--accent-glow);}
  .btn-primary:hover{transform:translateY(-1px);color:white;}
  #overlay{display:none;position:fixed;inset:0;background:rgba(7,7,17,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:1rem;}
  #overlay.show{display:flex;}
  #overlay h2{font-size:2rem;font-weight:900;}

  .share-game-btn { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .share-game-btn:hover { border-color: var(--accent); color: var(--accent-bright); }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="../index.html" class="back-btn" id="back-lbl">← الرئيسية</a>
    <span style="font-size:1.1rem;font-weight:900;">🔨 <span id="title-lbl">اضرب الخلد</span></span>
    <button class="share-game-btn" onclick="shareGame()" title="Share">📤</button>
      <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat-box"><span class="stat-val" id="score">0</span><span class="stat-lbl" id="score-lbl">النقاط</span></div>
    <div class="stat-box"><span class="stat-val" id="timer">60</span><span class="stat-lbl" id="time-lbl">ثانية</span></div>
    <div class="stat-box"><span class="stat-val" id="best">0</span><span class="stat-lbl" id="best-lbl">الأفضل</span></div>
  </div>

  <div class="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>

  <div id="grid"></div>

  <button class="btn btn-primary" onclick="startGame()" id="start-btn">▶ ابدأ</button>
</main>

<div class="ad-zone" style="padding:1rem 2rem;text-align:center;border-top:1px solid #1e1e3f;background:rgba(14,14,31,0.5);">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="3333333333"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="overlay">
  <div style="font-size:3.5rem">🔨</div>
  <h2 id="ov-title">انتهت اللعبة!</h2>
  <div style="color:var(--text-secondary)" id="ov-score">النقاط: 0</div>
  <button class="btn btn-primary" onclick="startGame();document.getElementById('overlay').classList.remove('show');" id="retry-btn">▶ مرة أخرى</button>
</div>

<script>
const HOLES = 9;
const TOTAL_TIME = 60;
let score, timeLeft, moleTimers, timerInt, gameRunning, best;
best = parseInt(localStorage.getItem('whack_best')||'0');
document.getElementById('best').textContent = best;

function buildGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for(let i=0;i<HOLES;i++){
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.id = 'hole'+i;
    hole.innerHTML = `<div class="mole">🦔</div><div class="hit-flash"></div><div class="miss-flash"></div>`;
    hole.addEventListener('click', ()=>whack(hole));
    hole.addEventListener('touchstart', e=>{e.preventDefault();whack(hole);},{passive:false});
    grid.appendChild(hole);
  }
}

function startGame(){
  buildGrid();
  score=0; timeLeft=TOTAL_TIME; gameRunning=true;
  document.getElementById('score').textContent=0;
  document.getElementById('timer').textContent=TOTAL_TIME;
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('timer-bar').style.background='linear-gradient(90deg,var(--accent),var(--accent-bright))';
  moleTimers=[];
  clearInterval(timerInt);
  // Spawn moles
  scheduleMole();
  timerInt = setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    document.getElementById('timer-bar').style.width=(timeLeft/TOTAL_TIME*100)+'%';
    if(timeLeft<=15) document.getElementById('timer-bar').style.background='linear-gradient(90deg,#ef4444,#f97316)';
    if(timeLeft<=0){ endGame(); }
  },1000);
}

function getDelay(){
  const elapsed = TOTAL_TIME - timeLeft;
  return Math.max(400, 1200 - elapsed*12);
}

function scheduleMole(){
  if(!gameRunning)return;
  const delay = getDelay();
  const t = setTimeout(()=>{
    if(!gameRunning)return;
    showMole();
    scheduleMole();
  }, delay);
  moleTimers.push(t);
}

function showMole(){
  const holes = document.querySelectorAll('.hole:not(.up)');
  if(!holes.length)return;
  const hole = holes[Math.floor(Math.random()*holes.length)];
  hole.classList.add('up');
  const visibleTime = Math.max(500, 900 - (TOTAL_TIME-timeLeft)*8);
  const t = setTimeout(()=>{
    if(hole.classList.contains('up')){ hole.classList.remove('up'); showMissEffect(hole); }
  }, visibleTime);
  moleTimers.push(t);
}

function whack(hole){
  if(!gameRunning||!hole.classList.contains('up'))return;
  hole.classList.remove('up');
  hole.classList.add('whacked');
  score++;
  document.getElementById('score').textContent=score;
  if(score>best){ best=score; localStorage.setItem('whack_best',best); document.getElementById('best').textContent=best; }
  // Score pop
  const pop = document.createElement('div');
  pop.className='score-pop'; pop.textContent='+1';
  hole.appendChild(pop);
  setTimeout(()=>{pop.remove();hole.classList.remove('whacked');},500);
}

function showMissEffect(hole){
  hole.classList.add('missed');
  score = Math.max(0, score-1);
  document.getElementById('score').textContent=score;
  setTimeout(()=>hole.classList.remove('missed'),300);
}

function endGame(){
  gameRunning=false;
  clearInterval(timerInt);
  moleTimers.forEach(clearTimeout);
  document.querySelectorAll('.hole').forEach(h=>h.classList.remove('up'));
  document.getElementById('ov-title').textContent=currentLang==='ar'?'انتهت اللعبة!':'Game Over!';
  document.getElementById('ov-score').textContent=(currentLang==='ar'?'النقاط: ':'Score: ')+score;
  document.getElementById('overlay').classList.add('show');
}

const t={
  ar:{title:'اضرب الخلد',back:'← الرئيسية',score:'النقاط',time:'ثانية',best:'الأفضل',start:'▶ ابدأ',again:'▶ مرة أخرى'},
  en:{title:'Whack-A-Mole',back:'← Home',score:'Score',time:'Seconds',best:'Best',start:'▶ Start',again:'▶ Play Again'}
};
let currentLang=localStorage.getItem('yallaplays_lang')||'ar';
function applyLang(l){
  currentLang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.documentElement.lang=l;
  document.getElementById('title-lbl').textContent=t[l].title;
  document.getElementById('back-lbl').textContent=t[l].back;
  document.getElementById('score-lbl').textContent=t[l].score;
  document.getElementById('time-lbl').textContent=t[l].time;
  document.getElementById('best-lbl').textContent=t[l].best;
  document.getElementById('start-btn').textContent=t[l].start;
  document.getElementById('retry-btn').textContent=t[l].again;
  document.getElementById('lang-btn').textContent=l==='ar'?'EN':'عر';
}
function toggleLang(){applyLang(currentLang==='ar'?'en':'ar');localStorage.setItem('yallaplays_lang',currentLang);}
applyLang(currentLang);
buildGrid();
</script>

<!-- Related & Comments -->
<section style="max-width:640px;margin:1.5rem auto;padding:0 1rem 2rem;">
  <!-- Related games -->
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;"><h3 style="font-size:0.95rem;font-weight:800;color:var(--text-primary);" id="related-title">ألعاب مشابهة</h3><a href="../index.html" style="font-size:0.78rem;color:var(--accent-bright);text-decoration:none;font-weight:700;">كل الألعاب ←</a></div>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;" id="related-games-list">
      <!-- filled by JS -->
    </div>
  </div>
  <!-- Disqus -->
  <div id="disqus_thread" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;"></div>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://yallaplay.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
</section>
<script>
// Related games
const allGames = [
  {href:'../games/snake.html',emoji:'🐍',name:'ثعبان'},
  {href:'../games/tictactoe.html',emoji:'❌',name:'إكس أو'},
  {href:'../games/memory.html',emoji:'🃏',name:'ذاكرة'},
  {href:'../games/2048.html',emoji:'🔢',name:'2048'},
  {href:'../games/flappy.html',emoji:'🐦',name:'الطائر'},
  {href:'../games/whackamole.html',emoji:'🔨',name:'اضرب الخلد'},
  {href:'../games/tetris.html',emoji:'🟦',name:'تيتريس'},
  {href:'../games/breakout.html',emoji:'🎯',name:'تحطيم الطوب'},
  {href:'../games/mathquiz.html',emoji:'🧮',name:'حساب'},
  {href:'../games/wordscramble.html',emoji:'📝',name:'كلمات'},
  {href:'../games/fruitcatch.html',emoji:'🍓',name:'فاكهة'},
  {href:'../games/carrace.html',emoji:'🏎️',name:'سباق'},
  {href:'../games/penalty.html',emoji:'⚽',name:'ركلة'},
  {href:'../games/bubbleshooter.html',emoji:'🫧',name:'فقاعات'},
];
const current = window.location.pathname.split('/').pop();
const related = allGames.filter(g=>!g.href.includes(current)).slice(0,6);
const list = document.getElementById('related-games-list');
if(list) list.innerHTML = related.map(g=>`
  <a href="${g.href}" style="display:flex;flex-direction:column;align-items:center;gap:0.3rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;text-decoration:none;color:var(--text-primary);transition:all 0.2s;min-width:80px;text-align:center;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
    <span style="font-size:1.5rem">${g.emoji}</span>
    <span style="font-size:0.75rem;font-weight:700">${g.name}</span>
  </a>`).join('');

function shareGame() {
  const url = window.location.href;
  const title_str = document.title;
  if (navigator.share) {
    navigator.share({ title: title_str, url });
  } else {
    navigator.clipboard.writeText(url)
      .then(() => showGameToast(typeof lang !== 'undefined' && lang === 'en' ? '\u2705 Link copied!' : '\u2705 \u062a\u0645 \u0646\u0633\u062e \u0627\u0644\u0631\u0627\u0628\u0637!'))
      .catch(() => showGameToast('\ud83d\udce4 Share link'));
  }
}
function showGameToast(msg) {
  let t = document.getElementById('game-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'game-toast';
    t.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;padding:0.6rem 1.25rem;border-radius:20px;font-size:0.85rem;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(124,58,237,0.5);transition:opacity 0.3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}
</script>
</body>
</html>
