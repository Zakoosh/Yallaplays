<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - YallaPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:#070711;--bg-card:#0e0e1f;--bg-elevated:#13132a;
    --border:#1e1e3f;--accent:#7c3aed;--accent-bright:#a855f7;
    --accent-glow:rgba(124,58,237,0.4);--gold:#f59e0b;--green:#10b981;
    --red:#ef4444;--text-primary:#f1f0ff;--text-secondary:#9ca3c8;
    --text-muted:#4b5280;--font-ar:'Cairo',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-ar);min-height:100vh;display:flex;flex-direction:column;}
  header{background:rgba(7,7,17,0.9);border-bottom:1px solid var(--border);padding:0 1.5rem;backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;}
  .header-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem;}
  .back-btn{color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .lang-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.3rem 0.6rem;border-radius:6px;font-family:var(--font-ar);font-weight:700;font-size:0.8rem;cursor:pointer;}
  main{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem;gap:1rem;}
  .scores{display:flex;gap:0.75rem;}
  .score-box{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:0.5rem 1.2rem;text-align:center;min-width:80px;}
  .score-val{font-size:1.3rem;font-weight:900;color:var(--accent-bright);display:block;}
  .score-lbl{font-size:0.68rem;color:var(--text-muted);}
  #grid-wrap{background:var(--bg-elevated);padding:8px;border-radius:14px;border:1px solid var(--border);box-shadow:0 0 30px var(--accent-glow);}
  #grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:min(400px,92vw);}
  .cell{
    aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-weight:900;background:#1a1a2e;transition:background 0.1s;
    font-size:clamp(1rem,5vw,1.6rem);
  }
  .v2{background:#eee4da;color:#776e65;}
  .v4{background:#ede0c8;color:#776e65;}
  .v8{background:#f2b179;color:#f9f6f2;}
  .v16{background:#f59563;color:#f9f6f2;}
  .v32{background:#f67c5f;color:#f9f6f2;}
  .v64{background:#f65e3b;color:#f9f6f2;}
  .v128{background:#edcf72;color:#f9f6f2;font-size:clamp(0.8rem,4vw,1.3rem);}
  .v256{background:#edcc61;color:#f9f6f2;font-size:clamp(0.8rem,4vw,1.3rem);}
  .v512{background:#edc850;color:#f9f6f2;font-size:clamp(0.8rem,4vw,1.3rem);}
  .v1024{background:#edc53f;color:#f9f6f2;font-size:clamp(0.65rem,3.5vw,1.1rem);}
  .v2048{background:#edc22e;color:#f9f6f2;font-size:clamp(0.65rem,3.5vw,1.1rem);box-shadow:0 0 20px rgba(237,194,46,0.5);}
  .new-tile{animation:popIn 0.2s ease both;}
  @keyframes popIn{0%{transform:scale(0);}80%{transform:scale(1.1);}100%{transform:scale(1);}}
  .merged-tile{animation:mergeIn 0.15s ease both;}
  @keyframes mergeIn{0%{transform:scale(1.2);}100%{transform:scale(1);}}
  .action-row{display:flex;gap:0.75rem;}
  .btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.6rem 1.4rem;border-radius:10px;font-family:var(--font-ar);font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-bright));color:white;border:none;box-shadow:0 4px 15px var(--accent-glow);}
  .btn-primary:hover{transform:translateY(-1px);color:white;}
  #overlay{display:none;position:fixed;inset:0;background:rgba(7,7,17,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:1rem;}
  #overlay.show{display:flex;}
  #overlay h2{font-size:2rem;font-weight:900;}
  .dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px;gap:4px;}
  .dpad .up{grid-column:2;grid-row:1;}
  .dpad .left{grid-column:1;grid-row:2;}
  .dpad .dn{grid-column:2;grid-row:2;}
  .dpad .right{grid-column:3;grid-row:2;}
  .ctrl-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);width:56px;height:56px;border-radius:10px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .ctrl-btn:active{background:var(--accent);border-color:var(--accent);}
  @media(min-width:600px){.dpad{display:none;}}

  .share-game-btn { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .share-game-btn:hover { border-color: var(--accent); color: var(--accent-bright); }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="../index.html" class="back-btn" id="back-lbl">← الرئيسية</a>
    <span style="font-size:1.1rem;font-weight:900;">🔢 <span id="title-lbl">2048</span></span>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <div class="score-box" style="padding:0.3rem 0.7rem;min-width:60px;">
        <span class="score-val" id="score">0</span>
        <span class="score-lbl" id="score-lbl">النقاط</span>
      </div>
      <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
    </div>
  </div>
</header>

<main>
  <div class="scores">
    <div class="score-box"><span class="score-val" id="cur-score">0</span><span class="score-lbl" id="cur-lbl">النقاط</span></div>
    <div class="score-box"><span class="score-val" id="best-score">0</span><span class="score-lbl" id="best-lbl">الأفضل</span></div>
  </div>

  <div id="grid-wrap"><div id="grid"></div></div>

  <div class="action-row">
    <button class="btn btn-primary" onclick="initGame()" id="new-btn">🔄 لعبة جديدة</button>
  </div>

  <div class="dpad">
    <button class="ctrl-btn up" onclick="move('up')">▲</button>
    <button class="ctrl-btn left" onclick="move('left')">◄</button>
    <button class="ctrl-btn dn" onclick="move('down')">▼</button>
    <button class="ctrl-btn right" onclick="move('right')">►</button>
  </div>
</main>

<div class="ad-zone" style="padding:1rem 2rem;text-align:center;border-top:1px solid #1e1e3f;background:rgba(14,14,31,0.5);">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="3333333333"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="overlay">
  <div style="font-size:3rem" id="overlay-emoji">😢</div>
  <h2 id="overlay-title">انتهت اللعبة!</h2>
  <div style="color:var(--text-secondary)" id="overlay-score">النقاط: 0</div>
  <button class="btn btn-primary" onclick="initGame();document.getElementById('overlay').classList.remove('show');" id="retry-btn">▶ مرة أخرى</button>
</div>

<script>
let board, score, best, won;
best = parseInt(localStorage.getItem('2048_best')||'0');
document.getElementById('best-score').textContent = best;

function initGame(){
  board = Array.from({length:4},()=>Array(4).fill(0));
  score = 0; won = false;
  document.getElementById('cur-score').textContent = 0;
  addRandom(); addRandom();
  render();
}

function addRandom(){
  const empty=[];
  board.forEach((r,i)=>r.forEach((v,j)=>{if(!v)empty.push([i,j]);}));
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  board[r][c]=Math.random()<0.9?2:4;
}

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  board.forEach(row=>row.forEach(val=>{
    const cell=document.createElement('div');
    cell.className='cell'+(val?' v'+val:'');
    cell.textContent=val||'';
    grid.appendChild(cell);
  }));
}

function move(dir){
  let moved=false;
  const prev=JSON.stringify(board);
  if(dir==='left')  board=board.map(r=>mergeLine(r));
  if(dir==='right') board=board.map(r=>mergeLine([...r].reverse()).reverse());
  if(dir==='up')    board=transpose(transpose(board).map(r=>mergeLine(r)));
  if(dir==='down')  board=transpose(transpose(board).map(r=>mergeLine([...r].reverse()).reverse()));
  if(JSON.stringify(board)!==prev){
    addRandom();
    render();
    document.getElementById('cur-score').textContent=score;
    if(score>best){best=score;localStorage.setItem('2048_best',best);document.getElementById('best-score').textContent=best;}
    if(!won&&board.some(r=>r.includes(2048))){won=true;showOverlay('🏆',currentLang==='ar'?'فزت! وصلت لـ 2048!':'You Win! Reached 2048!',true);}
    else if(!canMove())showOverlay('😢',currentLang==='ar'?'انتهت اللعبة!':'Game Over!',false);
  }
}

function mergeLine(line){
  let arr=line.filter(v=>v);
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]===arr[i+1]){arr[i]*=2;score+=arr[i];arr[i+1]=0;}
  }
  arr=arr.filter(v=>v);
  while(arr.length<4)arr.push(0);
  return arr;
}

function transpose(m){return m[0].map((_,i)=>m.map(r=>r[i]));}

function canMove(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(!board[r][c])return true;
    if(c<3&&board[r][c]===board[r][c+1])return true;
    if(r<3&&board[r][c]===board[r+1][c])return true;
  }
  return false;
}

function showOverlay(emoji,title,win){
  document.getElementById('overlay-emoji').textContent=emoji;
  document.getElementById('overlay-title').textContent=title;
  document.getElementById('overlay-score').textContent=(currentLang==='ar'?'النقاط: ':'Score: ')+score;
  document.getElementById('overlay').classList.add('show');
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){e.preventDefault();move('left');}
  if(e.key==='ArrowRight'){e.preventDefault();move('right');}
  if(e.key==='ArrowUp'){e.preventDefault();move('up');}
  if(e.key==='ArrowDown'){e.preventDefault();move('down');}
});

// Swipe
let tx,ty;
document.getElementById('grid-wrap').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('grid-wrap').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>30)move('right');else if(dx<-30)move('left');}
  else{if(dy>30)move('down');else if(dy<-30)move('up');}
},{passive:true});

// i18n
const t={
  ar:{title:'2048',back:'← الرئيسية',score:'النقاط',best:'الأفضل',newgame:'🔄 لعبة جديدة',again:'▶ مرة أخرى'},
  en:{title:'2048',back:'← Home',score:'Score',best:'Best',newgame:'🔄 New Game',again:'▶ Play Again'}
};
let currentLang=localStorage.getItem('yallaplays_lang')||'ar';
function applyLang(l){
  currentLang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.documentElement.lang=l;
  document.getElementById('title-lbl').textContent=t[l].title;
  document.getElementById('back-lbl').textContent=t[l].back;
  document.getElementById('cur-lbl').textContent=t[l].score;
  document.getElementById('best-lbl').textContent=t[l].best;
  document.getElementById('score-lbl').textContent=t[l].score;
  document.getElementById('new-btn').textContent=t[l].newgame;
  document.getElementById('retry-btn').textContent=t[l].again;
  document.getElementById('lang-btn').textContent=l==='ar'?'EN':'عر';
}
function toggleLang(){applyLang(currentLang==='ar'?'en':'ar');localStorage.setItem('yallaplays_lang',currentLang);}
applyLang(currentLang);
initGame();
</script>

<!-- Related & Comments -->
<section style="max-width:640px;margin:1.5rem auto;padding:0 1rem 2rem;">
  <!-- Related games -->
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;">
    <h3 style="font-size:0.95rem;font-weight:800;margin-bottom:1rem;color:var(--text-primary);" id="related-title">ألعاب مشابهة</h3>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;" id="related-games-list">
      <!-- filled by JS -->
    </div>
  </div>
  <!-- Disqus -->
  <div id="disqus_thread" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;"></div>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://yallaplay.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
</section>
<script>
// Related games
const allGames = [
  {href:'../games/snake.html',emoji:'🐍',name:'ثعبان'},
  {href:'../games/tictactoe.html',emoji:'❌',name:'إكس أو'},
  {href:'../games/memory.html',emoji:'🃏',name:'ذاكرة'},
  {href:'../games/2048.html',emoji:'🔢',name:'2048'},
  {href:'../games/flappy.html',emoji:'🐦',name:'الطائر'},
  {href:'../games/whackamole.html',emoji:'🔨',name:'اضرب الخلد'},
  {href:'../games/tetris.html',emoji:'🟦',name:'تيتريس'},
  {href:'../games/breakout.html',emoji:'🎯',name:'تحطيم الطوب'},
  {href:'../games/mathquiz.html',emoji:'🧮',name:'حساب'},
  {href:'../games/wordscramble.html',emoji:'📝',name:'كلمات'},
];
const current = window.location.pathname.split('/').pop();
const related = allGames.filter(g=>!g.href.includes(current)).slice(0,4);
const list = document.getElementById('related-games-list');
if(list) list.innerHTML = related.map(g=>`
  <a href="${g.href}" style="display:flex;flex-direction:column;align-items:center;gap:0.3rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;text-decoration:none;color:var(--text-primary);transition:all 0.2s;min-width:80px;text-align:center;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
    <span style="font-size:1.5rem">${g.emoji}</span>
    <span style="font-size:0.75rem;font-weight:700">${g.name}</span>
  </a>`).join('');

function shareGame() {
  const url = window.location.href;
  const title = document.title;
  if (navigator.share) {
    navigator.share({ title, url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.share-game-btn');
      btn.textContent = '\u2705';
      setTimeout(() => btn.textContent = '\ud83d\udce4', 2000);
    });
  }
}
</script>
</body>
</html>
