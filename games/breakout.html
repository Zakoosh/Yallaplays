<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحطيم الطوب / Breakout - YallaPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg-deep:#070711;--bg-card:#0e0e1f;--bg-elevated:#13132a;--border:#1e1e3f;--accent:#7c3aed;--accent-bright:#a855f7;--accent-glow:rgba(124,58,237,0.4);--gold:#f59e0b;--green:#10b981;--red:#ef4444;--text-primary:#f1f0ff;--text-secondary:#9ca3c8;--text-muted:#4b5280;--font-ar:'Cairo',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-ar);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  header{width:100%;background:rgba(7,7,17,0.9);border-bottom:1px solid var(--border);padding:0 1.5rem;backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;}
  .header-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem;}
  .back-btn{color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .lang-btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:0.3rem 0.6rem;border-radius:6px;font-family:var(--font-ar);font-weight:700;font-size:0.8rem;cursor:pointer;}
  main{flex:1;display:flex;flex-direction:column;align-items:center;padding:1rem;gap:0.75rem;width:100%;}
  .hud{display:flex;gap:0.75rem;}
  .hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:0.4rem 0.9rem;text-align:center;}
  .hud-val{font-size:1.1rem;font-weight:900;color:var(--accent-bright);display:block;}
  .hud-lbl{font-size:0.65rem;color:var(--text-muted);}
  .lives{display:flex;gap:4px;align-items:center;}
  .heart{font-size:1.1rem;}
  .heart.lost{opacity:0.2;}
  #wrap{position:relative;cursor:none;}
  canvas{border-radius:10px;border:2px solid var(--border);background:#070712;box-shadow:0 0 30px var(--accent-glow);display:block;touch-action:none;}
  #overlay{position:absolute;inset:0;background:rgba(7,7,17,0.9);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.9rem;backdrop-filter:blur(6px);}
  #overlay h2{font-size:1.8rem;font-weight:900;}
  .start-btn{background:linear-gradient(135deg,var(--accent),var(--accent-bright));color:white;border:none;padding:0.7rem 2rem;border-radius:10px;font-family:var(--font-ar);font-size:1rem;font-weight:700;cursor:pointer;}

  .share-game-btn { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .share-game-btn:hover { border-color: var(--accent); color: var(--accent-bright); }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="../index.html" class="back-btn" id="back-lbl">← الرئيسية</a>
    <span style="font-size:1.1rem;font-weight:900;">🎯 <span id="title-lbl">تحطيم الطوب</span></span>
    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
  </div>
</header>
<main>
  <div class="hud">
    <div class="hud-box"><span class="hud-val" id="score">0</span><span class="hud-lbl" id="score-lbl">النقاط</span></div>
    <div class="hud-box"><span class="hud-val" id="best">0</span><span class="hud-lbl" id="best-lbl">الأفضل</span></div>
    <div class="hud-box"><span class="hud-val" id="level-disp">1</span><span class="hud-lbl" id="level-lbl">المستوى</span></div>
    <div class="hud-box" style="display:flex;align-items:center;gap:4px;padding:0.4rem 0.7rem;">
      <span class="heart" id="h1">❤️</span><span class="heart" id="h2">❤️</span><span class="heart" id="h3">❤️</span>
    </div>
  </div>
  <div id="wrap">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div style="font-size:3rem">🎯</div>
      <h2 id="ov-title">تحطيم الطوب</h2>
      <p style="color:var(--text-secondary);font-size:0.85rem;" id="ov-msg">حرك الماوس أو المس للتحكم</p>
      <button class="start-btn" onclick="startGame()" id="start-btn">▶ ابدأ</button>
    </div>
  </div>
</main>

<div class="ad-zone" style="padding:1rem 2rem;text-align:center;border-top:1px solid #1e1e3f;background:rgba(14,14,31,0.5);">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="3333333333"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const W=Math.min(480,window.innerWidth-24);
const H=Math.min(520,window.innerHeight-200);
canvas.width=W; canvas.height=H;

const BRICK_COLS=8, BRICK_ROWS=5;
const BRICK_W=Math.floor((W-20)/(BRICK_COLS)), BRICK_H=22, BRICK_PAD=4;
const PADDLE_H=12, PADDLE_W=Math.floor(W*0.18);

const ROW_COLORS=['#ef4444','#f97316','#f59e0b','#22c55e','#06b6d4'];

let paddle,ball,bricks,score,lives,best,level,running,raf;
best=parseInt(localStorage.getItem('breakout_best')||'0');
document.getElementById('best').textContent=best;

function makeBricks(lvl){
  const b=[];
  const rows=Math.min(5+Math.floor(lvl/2),8);
  for(let r=0;r<rows;r++)
    for(let c=0;c<BRICK_COLS;c++){
      const hp=lvl>=3&&r<2?2:1;
      b.push({x:10+c*BRICK_W,y:50+r*(BRICK_H+BRICK_PAD),w:BRICK_W-BRICK_PAD,h:BRICK_H,hp,maxHp:hp,color:ROW_COLORS[r%5]});
    }
  return b;
}

function startGame(lvl=1){
  level=lvl;
  document.getElementById('level-disp').textContent=level;
  if(lvl===1){score=0;lives=3;document.getElementById('score').textContent=0;updateHearts();}
  const speed=2.8+level*0.4;
  const ang=(Math.random()*Math.PI/2+Math.PI/4);
  paddle={x:W/2-PADDLE_W/2,y:H-30,w:PADDLE_W,h:PADDLE_H};
  ball={x:W/2,y:H-50,vx:Math.cos(ang)*speed,vy:-Math.sin(ang)*speed,r:8};
  bricks=makeBricks(level);
  running=true;
  document.getElementById('overlay').style.display='none';
  cancelAnimationFrame(raf);
  loop();
}

function updateHearts(){
  for(let i=1;i<=3;i++) document.getElementById('h'+i).classList.toggle('lost',i>lives);
}

function loop(){
  raf=requestAnimationFrame(loop);
  ctx.fillStyle='#070712';ctx.fillRect(0,0,W,H);

  // Draw bricks
  bricks.forEach(b=>{
    if(b.hp<=0)return;
    ctx.fillStyle=b.hp<b.maxHp?'#555':b.color;
    ctx.shadowColor=b.color;ctx.shadowBlur=b.hp===b.maxHp?8:0;
    ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(b.x+2,b.y+2,b.w-4,4);
  });

  // Paddle
  const pg=ctx.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);
  pg.addColorStop(0,'#7c3aed');pg.addColorStop(1,'#a855f7');
  ctx.fillStyle=pg;ctx.shadowColor='#a855f7';ctx.shadowBlur=12;
  ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);ctx.fill();
  ctx.shadowBlur=0;

  // Ball
  ctx.fillStyle='#f1f0ff';ctx.shadowColor='#f1f0ff';ctx.shadowBlur=15;
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  if(!running)return;

  // Move ball
  ball.x+=ball.vx; ball.y+=ball.vy;

  // Wall bounce
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);}

  // Ball lost
  if(ball.y>H+ball.r){
    lives--;updateHearts();
    if(lives<=0){endGame(false);return;}
    ball={x:W/2,y:H-50,vx:(Math.random()>0.5?1:-1)*2.5,vy:-3,r:8};
  }

  // Paddle hit
  if(ball.y+ball.r>paddle.y&&ball.y-ball.r<paddle.y+paddle.h&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){
    ball.vy=-Math.abs(ball.vy);
    const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    ball.vx=hit*5;
  }

  // Brick hit
  let allDead=true;
  for(const b of bricks){
    if(b.hp<=0)continue;
    allDead=false;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
      b.hp--;
      const pts=b.hp===0?10:5;
      score+=pts*(level);
      document.getElementById('score').textContent=score;
      if(score>best){best=score;localStorage.setItem('breakout_best',best);document.getElementById('best').textContent=best;}
      const fromLeft=Math.abs(ball.x-(b.x+b.w));
      const fromRight=Math.abs(ball.x-b.x);
      const fromTop=Math.abs(ball.y-(b.y+b.h));
      const fromBottom=Math.abs(ball.y-b.y);
      const minDist=Math.min(fromLeft,fromRight,fromTop,fromBottom);
      if(minDist===fromTop||minDist===fromBottom)ball.vy*=-1;
      else ball.vx*=-1;
      break;
    }
  }
  if(allDead){
    if(level<3){
      running=false;
      setTimeout(()=>startGame(level+1),500);
    } else {
      endGame(true);
    }
  }
}

function endGame(win){
  running=false;
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  document.getElementById('ov-title').textContent=win?(currentLang==='ar'?'🏆 فزت!':'🏆 You Win!'):(currentLang==='ar'?'انتهت اللعبة!':'Game Over!');
  document.getElementById('ov-msg').textContent=(currentLang==='ar'?'النقاط: ':'Score: ')+score;
  document.getElementById('start-btn').textContent=currentLang==='ar'?'▶ مرة أخرى':'▶ Play Again';
}

// Mouse
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  paddle.x=e.clientX-r.left-paddle.w/2;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
});

// Touch
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  paddle.x=e.touches[0].clientX-r.left-paddle.w/2;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
},{passive:false});

// i18n
const t={ar:{title:'تحطيم الطوب',back:'← الرئيسية',score:'النقاط',best:'الأفضل',level:'المستوى',start:'▶ ابدأ',again:'▶ مرة أخرى',hint:'حرك الماوس أو المس للتحكم'},en:{title:'Breakout',back:'← Home',score:'Score',best:'Best',level:'Level',start:'▶ Start',again:'▶ Play Again',hint:'Move mouse or touch to control'}};
let currentLang=localStorage.getItem('yallaplays_lang')||'ar';
function applyLang(l){
  currentLang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.documentElement.lang=l;
  document.getElementById('title-lbl').textContent=t[l].title;
  document.getElementById('back-lbl').textContent=t[l].back;
  document.getElementById('score-lbl').textContent=t[l].score;
  document.getElementById('best-lbl').textContent=t[l].best;
  document.getElementById('level-lbl').textContent=t[l].level;
  document.getElementById('start-btn').textContent=t[l].start;
  document.getElementById('ov-msg').textContent=t[l].hint;
  document.getElementById('lang-btn').textContent=l==='ar'?'EN':'عر';
}
function toggleLang(){applyLang(currentLang==='ar'?'en':'ar');localStorage.setItem('yallaplays_lang',currentLang);}
applyLang(currentLang);
ctx.fillStyle='#070712';ctx.fillRect(0,0,W,H);
</script>

<!-- Related & Comments -->
<section style="max-width:640px;margin:1.5rem auto;padding:0 1rem 2rem;">
  <!-- Related games -->
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;">
    <h3 style="font-size:0.95rem;font-weight:800;margin-bottom:1rem;color:var(--text-primary);" id="related-title">ألعاب مشابهة</h3>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;" id="related-games-list">
      <!-- filled by JS -->
    </div>
  </div>
  <!-- Disqus -->
  <div id="disqus_thread" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;"></div>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://yallaplay.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
</section>
<script>
// Related games
const allGames = [
  {href:'../games/snake.html',emoji:'🐍',name:'ثعبان'},
  {href:'../games/tictactoe.html',emoji:'❌',name:'إكس أو'},
  {href:'../games/memory.html',emoji:'🃏',name:'ذاكرة'},
  {href:'../games/2048.html',emoji:'🔢',name:'2048'},
  {href:'../games/flappy.html',emoji:'🐦',name:'الطائر'},
  {href:'../games/whackamole.html',emoji:'🔨',name:'اضرب الخلد'},
  {href:'../games/tetris.html',emoji:'🟦',name:'تيتريس'},
  {href:'../games/breakout.html',emoji:'🎯',name:'تحطيم الطوب'},
  {href:'../games/mathquiz.html',emoji:'🧮',name:'حساب'},
  {href:'../games/wordscramble.html',emoji:'📝',name:'كلمات'},
];
const current = window.location.pathname.split('/').pop();
const related = allGames.filter(g=>!g.href.includes(current)).slice(0,4);
const list = document.getElementById('related-games-list');
if(list) list.innerHTML = related.map(g=>`
  <a href="${g.href}" style="display:flex;flex-direction:column;align-items:center;gap:0.3rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;text-decoration:none;color:var(--text-primary);transition:all 0.2s;min-width:80px;text-align:center;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
    <span style="font-size:1.5rem">${g.emoji}</span>
    <span style="font-size:0.75rem;font-weight:700">${g.name}</span>
  </a>`).join('');

function shareGame() {
  const url = window.location.href;
  const title = document.title;
  if (navigator.share) {
    navigator.share({ title, url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.share-game-btn');
      btn.textContent = '\u2705';
      setTimeout(() => btn.textContent = '\ud83d\udce4', 2000);
    });
  }
}
</script>
</body>
</html>
