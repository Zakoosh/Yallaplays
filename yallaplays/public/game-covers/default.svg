    <circle cx="890" cy="190" r="12" fill="#fff" />
    <path d="M900 160 L930 160 L930 190 L960 190 L960 220 L930 220 L930 250 L900 250 L900 220 L870 220 L870 190 L900 190 Z" fill="#fff" opacity="0.8" />
