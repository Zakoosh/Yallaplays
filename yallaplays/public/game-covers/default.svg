  <text x="80" y="430" font-family="Inter, sans-serif" font-size="32" fill="#cbd5e1">ألعاب سريعة، تصميم مودرن، أداء ممتاز.</text>
  <text x="80" y="490" font-family="Inter, sans-serif" font-size="24" fill="#94a3b8">جرب الآن على الجوال والكمبيوتر.</text>
